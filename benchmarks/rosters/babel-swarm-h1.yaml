# Fully self-hosted H1 swarm: every worker runs on babel GPUs (marginal cost ~$0).
# GPU budget: deepseek-v4-flash (4) + leanstral fp8 (4) = exactly the 8-GPU cap.
# Requires: sbatch deepseek-v4-flash.sh + leanstral.sh, tunnel up.
# (To use qwen/goedel instead of one of them, swap the stanzas below.)
agents:
  - names: [primary]
    model: deepseek-v4-flash
    backend: codex
    provider: vllm
    base_url: ${BABEL_DSV4_URL}
    api_key: unity
    strength: 7
  - names: [leanstral-1]
    model: leanstral
    backend: codex
    provider: vllm
    base_url: ${BABEL_LEANSTRAL_URL}
    api_key: unity
    strength: 6
