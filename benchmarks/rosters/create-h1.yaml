# Breadth-heavy, cheap: mid primary + small swarm.
agents:
  - names: [primary]
    model: claude-sonnet-5
    backend: claude_code
    provider: anthropic
    strength: 8
  - names: [glm-1]
    model: glm-5.1
    backend: codex
    provider: freeinference
    base_url: ${FREEINFERENCE_BASE_URL}
    api_key: ${FREEINFERENCE_API_KEY}
    strength: 5
    budget: 4
  - names: [mm-1, mm-2]
    model: minimax-m2.5
    backend: codex
    provider: freeinference
    base_url: ${FREEINFERENCE_BASE_URL}
    api_key: ${FREEINFERENCE_API_KEY}
    strength: 4
    budget: 3
  - names: [qwen-fi-1, qwen-fi-2]
    model: qwen3.6-35b
    backend: codex
    provider: freeinference
    base_url: ${FREEINFERENCE_BASE_URL}
    api_key: ${FREEINFERENCE_API_KEY}
    strength: 4
    budget: 3
  - names: [free-1]
    model: poolside/laguna-m.1:free
    backend: claude_code
    provider: openrouter
    base_url: ${OPENROUTER_ANTHROPIC_URL}
    api_key: ${OPENROUTER_API_KEY}
    strength: 3
